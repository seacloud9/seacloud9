  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
    <defs>
      <!-- Animated Gradient mapping exactly to the bird's vertical coordinates -->
      <linearGradient id="bottomUpGradient" gradientUnits="userSpaceOnUse" x1="0" y1="1280" x2="0" y2="80" spreadMethod="repeat">
        <stop offset="0%" stop-color="#55ffff" />   <!-- Extra Bright Neon Cyan -->
        <stop offset="33%" stop-color="#66ccff" />  <!-- Ultra Bright Sky Blue -->
        <stop offset="66%" stop-color="#3377ff" />  <!-- Lighter Vibrant Bright Blue -->
        <stop offset="100%" stop-color="#55ffff" /> <!-- Back to Cyan for a seamless loop -->
        <!-- Translating the gradient Y-axis upward to create a continuous scanning effect. 10x slower (30s) -->
        <animateTransform attributeName="gradientTransform" type="translate" values="0,0; 0,-1200" dur="30s" repeatCount="indefinite" />
      </linearGradient>
    </defs>

    <style>
      /* CSS for the neon glow. Structural fonts are placed inline below for GitHub safety. */
      .ascii-line {
        /* 4x brighter, intense glowing shadow to pop on a transparent background */
        text-shadow: 0 0 4px #00ffff, 
                     0 0 10px #00ffff, 
                     0 0 20px #00aaff, 
                     0 0 40px #0055ff, 
                     0 0 80px #0055ff;
        user-select: none;
      }
    </style>

    <!-- Transparent background -->
    <rect width="100%" height="100%" fill="transparent" />

